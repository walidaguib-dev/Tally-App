services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5198:5198"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: ${ConnectionStrings__Default}
      JWT__Issuer: ${JWT__Issuer}
      JWT__Audience: ${JWT__Audience}
      JWT__Key: ${JWT__Key}
      JWT__AccessTokenExpirationMinutes: ${JWT__AccessTokenExpirationMinutes}
      JWT__RefreshTokenExpirationDays: ${JWT__RefreshTokenExpirationDays}
      Smtp__Host: ${Smtp__Host}
      Smtp__Port: ${Smtp__Port}
      Smtp__EnableSsl: ${Smtp__EnableSsl}
      Smtp__UserName: ${Smtp__UserName}
      Smtp__Password: ${Smtp__Password}
      Smtp__From: ${Smtp__From}
      Smtp__FromName: ${Smtp__FromName}
      RedisConnectionString: ${RedisConnectionString}
      CloudinarySettings__CloudName: ${CloudinarySettings__CloudName}
      CloudinarySettings__ApiKey: ${CloudinarySettings__ApiKey}
      CloudinarySettings__ApiSecret: ${CloudinarySettings__ApiSecret}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5198/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: Tally
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8025",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  redis_data:
